<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Cafe</title>
</head>
<body>

    <!-- Header -->
    <header>
        <nav>
            <ul>
                <li><a href="#home">Beranda</a></li>
                <li><a href="#about">Tentang Kami</a></li>
                <li><a href="#menu">Menu</a></li>
                <li><a href="#gallery">Galeri</a></li>
                <li><a href="#contact">Kontak & Lokasi</a></li>
            </ul>
        </nav>
    </header>

    <!-- Home -->
    <section id="home">
        <div class="logo"></div>
        <h1>Nama Cafe</h1>
        <p>Slogan Cafe</p>

        <div class="hero-image"></div>

        <div class="operational-hours"></div>
        <div class="short-description"></div>

        <div class="cta-buttons">
            <a href="#menu">Lihat Menu</a>
            <a href="#contact">Hubungi Kami</a>
        </div>
    </section>

    <!-- About Us -->
    <section id="about">
        <h2>Tentang Kami</h2>

        <div class="history"></div>
        <div class="vision-mission"></div>
        <div class="cafe-concept"></div>
        <div class="advantages"></div>

        <div class="interior-gallery"></div>
    </section>

    <!-- Menu -->
    <section id="menu">
        <h2>Menu</h2>

        <div class="menu-categories">
            <section class="coffee"></section>
            <section class="non-coffee"></section>
            <section class="food"></section>
            <section class="dessert"></section>
        </div>

        <div class="best-seller"></div>
    </section>

    <!-- Gallery -->
    <section id="gallery">
        <h2>Galeri</h2>

        <div class="interior-photos"></div>
        <div class="exterior-photos"></div>
        <div class="food-drink-photos"></div>
        <div class="event-documentation"></div>
    </section>

    <!-- Contact & Location -->
    <section id="contact">
        <h2>Kontak & Lokasi</h2>

        <div class="address"></div>
        <div class="phone-whatsapp"></div>
        <div class="email"></div>

        <div class="map"></div>

        <div class="operational-hours"></div>

        <div class="social-media"></div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Nama Cafe</p>
    </footer>

</body>
</html>
